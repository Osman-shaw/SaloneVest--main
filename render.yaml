# Backend image is built only from backend/Dockerfile (Node + npm live there).
# Do not set buildCommand/startCommand for runtime: docker — that causes
# "npm: not found" if the platform runs them outside the Node base image.
services:
  - type: web
    name: salonevest-backend
    runtime: docker
    plan: free
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SOLANA_NETWORK
        value: devnet
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: PROGRAM_ID
        sync: false
